<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

.card {
  background: #1e293b;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
}

.bar {
  width: 90%;
  height: 25px;
  background: #334155;
  border-radius: 20px;
  margin: auto;
}

.fill {
  height: 25px;
  border-radius: 20px;
  background: linear-gradient(90deg, green, yellow, red);
  width: 0%;
  transition: 0.5s;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<h1>🗑 Smart Waste Dashboard</h1>

<div id="container"></div>

<script>

// 🔥 MQTT CONNECT (YOUR CLOUD)
const client = mqtt.connect("wss://0723a859e80346dca42e005efea66a3e.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "hivemq.webclient.1774194227430",
  password: "2aR@4:Fv;I?kNzW8lA5n"
});

let bins = {
  "Dustbin 1": {
    level: 0,
    location: "https://maps.google.com/?q=11.6643,78.1460"
  },
  "Dustbin 2": {
    level: 0,
    location: "https://maps.google.com/?q=13.0827,80.2707"
  }
};

client.on("connect", () => {
  console.log("MQTT Connected");

  client.subscribe("dustbin1/level");
  client.subscribe("dustbin2/level");
});

client.on("message", (topic, message) => {

  let value = parseInt(message.toString());

  if(topic === "dustbin1/level") bins["Dustbin 1"].level = value;
  if(topic === "dustbin2/level") bins["Dustbin 2"].level = value;

  updateUI();
});

function updateUI()
{
  let arr = Object.entries(bins);

  // 🔥 SORT HIGH → TOP
  arr.sort((a,b) => b[1].level - a[1].level);

  let html = "";

  arr.forEach(([name,data]) => {

    html += `
      <div class="card">
        <h2>${name}</h2>
        <h3>${data.level}%</h3>

        <div class="bar">
          <div class="fill" style="width:${data.level}%"></div>
        </div>

        ${data.level >= 80 ? "<h3 style='color:red'>⚠ FULL</h3>" : ""}

        <br>
        <a href="${data.location}" target="_blank">
          <button>📍 View Location</button>
        </a>
      </div>
    `;
  });

  document.getElementById("container").innerHTML = html;
}

</script>

</body>
</html>
