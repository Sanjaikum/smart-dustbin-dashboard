<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* BUCKET */
.bucket {
  width: 120px;
  height: 200px;
  border: 3px solid white;
  border-radius: 10px;
  margin: auto;
  position: relative;
  overflow: hidden;
}

.fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: green;
  transition: height 0.7s ease;
}

/* CARD */
.card {
  background: #1e293b;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  display: inline-block;
  width: 40%;
}

/* TABLE */
table {
  width: 90%;
  margin: auto;
  border-collapse: collapse;
  margin-top: 30px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #444;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>🗑 Smart Waste Dashboard</h1>

<div id="status">🔴 Connecting...</div>

<div id="cards"></div>

<h2>📊 Priority Collection Table</h2>

<table id="table"></table>

<script>

// ===== MQTT CONNECT =====
const client = mqtt.connect("wss://0723a859e80346dca42e005efea66a3e.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "hivemq.webclient.1775398960141",
  password: "0Z.#C7p!oj3zA,vaBP9J",
  reconnectPeriod: 2000
});

// ===== BIN DATA =====
let bins = {
  "Dustbin 1": {
    level: 0,
    topic: "dustbin1/level",
    location: "https://maps.google.com/?q=11.6643,78.1460",
    status: "Offline"
  },
  "Dustbin 2": {
    level: 0,
    topic: "dustbin2/level",
    location: "https://maps.google.com/?q=13.0827,80.2707",
    status: "Offline"
  }
};

// ===== CONNECT =====
client.on("connect", () => {
  document.getElementById("status").innerHTML = "🟢 Connected";

  Object.values(bins).forEach(bin => {
    client.subscribe(bin.topic);
  });
});

// ===== RECEIVE DATA =====
client.on("message", (topic, message) => {

  let value = parseInt(message.toString());
  if (isNaN(value)) return;

  value = Math.max(0, Math.min(100, value));

  Object.keys(bins).forEach(name => {
    if (bins[name].topic === topic) {
      bins[name].level = value;
      bins[name].status = "Online";
    }
  });

  updateUI();
});

// ===== OFFLINE =====
client.on("offline", () => {
  document.getElementById("status").innerHTML = "🔴 Offline";
});

// ===== UI UPDATE =====
function updateUI() {

  let arr = Object.entries(bins);

  // SORT HIGH → LOW
  arr.sort((a,b)=>b[1].level - a[1].level);

  // ===== CARDS =====
  let cardHTML = "";

  arr.forEach(([name,data]) => {

    let color = "green";
    if(data.level > 70) color = "red";
    else if(data.level > 40) color = "orange";

    cardHTML += `
      <div class="card">
        <h2>${name}</h2>

        <div class="bucket">
          <div class="fill" style="height:${data.level}%; background:${color}"></div>
        </div>

        <h3>${data.level}%</h3>
        <p>${data.status}</p>
      </div>
    `;
  });

  document.getElementById("cards").innerHTML = cardHTML;

  // ===== TABLE =====
  let tableHTML = `
    <tr>
      <th>Rank</th>
      <th>Dustbin</th>
      <th>Level</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  arr.forEach(([name,data], index) => {
    tableHTML += `
      <tr>
        <td>${index+1}</td>
        <td>${name}</td>
        <td>${data.level}%</td>
        <td>${data.status}</td>
        <td>
          <a href="${data.location}" target="_blank">
            <button>📍 View</button>
          </a>
        </td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = tableHTML;
}

// INITIAL LOAD
updateUI();

</script>

</body>
</html>
