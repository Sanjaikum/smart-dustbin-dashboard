<script>

// MQTT CONNECT (Auto reconnect + stable)
const client = mqtt.connect("wss://0723a859e80346dca42e005efea66a3e.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "hivemq.webclient.1775398960141",
  password: "0Z.#C7p!oj3zA,vaBP9J",
  reconnectPeriod: 2000,
  connectTimeout: 4000
});

// BIN DATA
let bins = {
  "Dustbin 1": {
    level: 0,
    topic: "dustbin1/level",
    location: "https://maps.google.com/?q=11.6643,78.1460",
    status: "Offline"
  },
  "Dustbin 2": {
    level: 0,
    topic: "dustbin2/level",
    location: "https://maps.google.com/?q=13.0827,80.2707",
    status: "Offline"
  }
};

// CONNECT
client.on("connect", () => {
  console.log("MQTT Connected ✅");

  Object.values(bins).forEach(bin => {
    client.subscribe(bin.topic);
  });
});

// MESSAGE RECEIVE
client.on("message", (topic, message) => {

  let value = parseInt(message.toString());

  // ❌ Avoid invalid data
  if (isNaN(value)) return;

  // Clamp value 0-100
  value = Math.max(0, Math.min(100, value));

  // Update correct bin
  Object.keys(bins).forEach(name => {
    if (bins[name].topic === topic) {
      bins[name].level = value;
      bins[name].status = "Online";
    }
  });

  updateUI();
});

// CONNECTION STATUS
client.on("offline", () => {
  console.log("MQTT Offline ❌");
  Object.keys(bins).forEach(name => bins[name].status = "Offline");
  updateUI();
});

client.on("reconnect", () => {
  console.log("Reconnecting...");
});


// UI UPDATE FUNCTION
function updateUI() {

  let arr = Object.entries(bins);

  // 🔥 SORT HIGH PRIORITY
  arr.sort((a,b)=>b[1].level - a[1].level);

  /* ===== CARDS ===== */
  let cardHTML = "";

  arr.forEach(([name,data]) => {

    let color = data.level > 70 ? "red" : data.level > 40 ? "yellow" : "green";

    cardHTML += `
      <div class="card">
        <h2>${name}</h2>

        <div class="bucket">
          <div class="fill" style="height:${data.level}%; background:${color}"></div>
        </div>

        <h3>${data.level}%</h3>
        <p>Status: ${data.status}</p>
      </div>
    `;
  });

  document.getElementById("cards").innerHTML = cardHTML;

  /* ===== TABLE ===== */
  let tableHTML = `
    <tr>
      <th>Rank</th>
      <th>Dustbin</th>
      <th>Level</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  `;

  arr.forEach(([name,data], index) => {
    tableHTML += `
      <tr>
        <td>${index+1}</td>
        <td>${name}</td>
        <td>${data.level}%</td>
        <td>${data.status}</td>
        <td>
          <a href="${data.location}" target="_blank">
            <button>📍 View</button>
          </a>
        </td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = tableHTML;
}

// INITIAL UI LOAD
updateUI();

</script>
