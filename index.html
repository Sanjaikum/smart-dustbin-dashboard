<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* BUCKET */
.bucket {
  width: 120px;
  height: 200px;
  border: 3px solid white;
  border-radius: 10px;
  margin: auto;
  position: relative;
  overflow: hidden;
}

.fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(to top, green, yellow, red);
  transition: height 0.7s ease;
}

/* CARD */
.card {
  background: #1e293b;
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  display: inline-block;
  width: 40%;
}

/* TABLE */
table {
  width: 90%;
  margin: auto;
  border-collapse: collapse;
  margin-top: 30px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #444;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
}

</style>
</head>

<body>

<h1>🗑 Smart Waste Dashboard</h1>

<div id="cards"></div>

<h2>📊 Priority Collection Table</h2>
<table id="table">
  <tr>
    <th>Rank</th>
    <th>Dustbin</th>
    <th>Level</th>
    <th>Action</th>
  </tr>
</table>

<script>

// MQTT CONNECT
const client = mqtt.connect("wss://0723a859e80346dca42e005efea66a3e.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "hivemq.webclient.1774194227430",
  password: "2aR@4:Fv;I?kNzW8lA5n"
});

let bins = {
  "Dustbin 1": {
    level: 0,
    location: "https://maps.google.com/?q=11.6643,78.1460"
  },
  "Dustbin 2": {
    level: 0,
    location: "https://maps.google.com/?q=13.0827,80.2707"
  }
};

client.on("connect", () => {
  client.subscribe("dustbin1/level");
  client.subscribe("dustbin2/level");
});

client.on("message", (topic, message) => {
  let value = parseInt(message.toString());

  if(topic === "dustbin1/level") bins["Dustbin 1"].level = value;
  if(topic === "dustbin2/level") bins["Dustbin 2"].level = value;

  updateUI();
});

function updateUI() {

  let arr = Object.entries(bins);

  // 🔥 SORT (HIGH → TOP)
  arr.sort((a,b)=>b[1].level - a[1].level);

  /* ===== CARDS ===== */
  let cardHTML = "";

  arr.forEach(([name,data]) => {
    cardHTML += `
      <div class="card">
        <h2>${name}</h2>
        <div class="bucket">
          <div class="fill" style="height:${data.level}%"></div>
        </div>
        <h3>${data.level}%</h3>
      </div>
    `;
  });

  document.getElementById("cards").innerHTML = cardHTML;

  /* ===== TABLE ===== */
  let tableHTML = `
    <tr>
      <th>Rank</th>
      <th>Dustbin</th>
      <th>Level</th>
      <th>Action</th>
    </tr>
  `;

  arr.forEach(([name,data], index) => {
    tableHTML += `
      <tr>
        <td>${index+1}</td>
        <td>${name}</td>
        <td>${data.level}%</td>
        <td>
          <a href="${data.location}" target="_blank">
            <button>📍 View</button>
          </a>
        </td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = tableHTML;
}

</script>

</body>
</html>
